<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spot the Scam</title>
<style>
  :root{
    --ink:#16263a; --muted:#5a6b7b; --faint:#94a3b8;
    --teal:#0f766e; --teal-dark:#115e59; --teal-soft:#ccfbf1; --teal-ring:#99f6e4;
    --rose:#be123c; --rose-soft:#ffe4e6; --rose-ring:#fecdd3;
    --amber:#b45309; --amber-soft:#fef3c7; --amber-ring:#fde68a;
    --line:#e2e8f0; --line-soft:#eef2f6;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    background:linear-gradient(to bottom,#f8fafc,#f1f0ec);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .serif{font-family:Georgia,"Times New Roman",serif;}
  .wrap{max-width:680px;margin:0 auto;padding:24px 20px 8px;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  :focus-visible{outline:none;box-shadow:0 0 0 4px var(--teal-ring);}
  .muted{color:var(--muted);}
  .faint{color:var(--faint);}

  /* header */
  .act-head{display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .act-id{display:flex;align-items:center;gap:12px;}
  .act-id .logo{display:flex;align-items:center;justify-content:center;height:44px;width:44px;border-radius:16px;background:var(--teal);color:#fff;}
  .act-id h1{font-size:24px;font-weight:600;margin:0;color:#0f172a;line-height:1;}
  .act-id p{font-size:16px;color:var(--muted);margin:4px 0 0;}
  .score{border-radius:16px;background:#fff;padding:8px 16px;text-align:right;box-shadow:0 0 0 1px var(--line);}
  .score .lab{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--amber);}
  .score .val{font-size:20px;font-weight:600;color:#0f172a;}

  /* welcome */
  .welcome{display:flex;flex-direction:column;align-items:center;text-align:center;padding:36px 8px;}
  .welcome .biglogo{display:flex;align-items:center;justify-content:center;height:80px;width:80px;border-radius:24px;background:var(--teal);color:#fff;box-shadow:0 10px 24px rgba(15,118,110,.25);}
  .welcome h1{font-size:44px;font-weight:600;margin:28px 0 0;line-height:1.1;color:#0f172a;}
  .welcome .lead{font-size:22px;line-height:1.5;color:var(--muted);max-width:460px;margin:20px 0 0;}
  .steps{width:100%;max-width:460px;margin:36px 0 0;display:flex;flex-direction:column;gap:12px;text-align:left;}
  .step{display:flex;align-items:center;gap:16px;background:#fff;border-radius:16px;padding:16px 20px;box-shadow:0 0 0 1px var(--line);}
  .step .n{display:flex;align-items:center;justify-content:center;height:36px;width:36px;flex:none;border-radius:999px;background:var(--amber-soft);color:var(--amber);font-weight:600;font-size:18px;font-family:Georgia,serif;}
  .step p{font-size:20px;color:#334155;margin:0;}

  .btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:12px;background:var(--teal);color:#fff;border-radius:16px;padding:20px 36px;font-size:24px;font-weight:600;box-shadow:0 4px 12px rgba(15,118,110,.2);transition:background .15s;}
  .btn-primary:hover{background:var(--teal-dark);}
  .btn-primary.full{width:100%;padding:20px;}

  /* message */
  .msg{border-radius:24px;background:#fff;overflow:hidden;box-shadow:0 0 0 1px var(--line);margin-top:24px;}
  .msg .chan{display:flex;align-items:center;gap:12px;background:#f8fafc;border-bottom:1px solid var(--line-soft);padding:14px 24px;color:var(--muted);font-size:15px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
  .msg .body{padding:24px;}
  .msg .from{font-size:18px;color:var(--muted);}
  .msg .from b{color:#1e293b;}
  .msg .subj{font-size:23px;font-weight:600;margin-top:4px;color:#0f172a;}
  .msg .text{font-size:23px;line-height:1.5;color:#1e293b;margin:16px 0 0;white-space:pre-line;}

  .choices{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px;}
  @media (max-width:560px){.choices{grid-template-columns:1fr;}}
  .choice{display:flex;align-items:center;justify-content:center;gap:12px;background:#fff;border-radius:16px;padding:24px;font-size:23px;font-weight:600;transition:background .15s;}
  .choice.safe{color:var(--teal-dark);box-shadow:0 0 0 2px var(--teal-ring);}
  .choice.safe:hover{background:#f0fdfa;}
  .choice.scam{color:var(--rose);box-shadow:0 0 0 2px var(--rose-ring);}
  .choice.scam:hover{background:#fff1f2;}

  /* reveal */
  .verdict{display:flex;align-items:center;gap:16px;border-radius:16px;padding:20px 24px;margin-top:24px;}
  .verdict.right{background:var(--teal-soft);box-shadow:0 0 0 1px var(--teal-ring);}
  .verdict.wrong{background:var(--amber-soft);box-shadow:0 0 0 1px var(--amber-ring);}
  .verdict .badge{display:flex;align-items:center;justify-content:center;height:48px;width:48px;flex:none;border-radius:999px;color:#fff;}
  .verdict.right .badge{background:#0d9488;}
  .verdict.wrong .badge{background:#f59e0b;}
  .verdict h2{font-size:24px;font-weight:600;margin:0;color:#0f172a;}
  .verdict p{font-size:20px;color:#475569;margin:2px 0 0;}

  .signs{border-radius:16px;background:#fff;padding:24px;margin-top:20px;box-shadow:0 0 0 1px var(--line-soft);}
  .signs h3{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:600;margin:0;}
  .signs.scam h3{color:var(--rose);}
  .signs.legit h3{color:var(--teal);}
  .signs ul{list-style:none;padding:0;margin:16px 0 0;display:flex;flex-direction:column;gap:12px;}
  .signs li{display:flex;align-items:flex-start;gap:12px;font-size:20px;line-height:1.5;color:#334155;}
  .signs li .dot{margin-top:9px;height:10px;width:10px;flex:none;border-radius:999px;}
  .signs.scam li .dot{background:#f43f5e;}
  .signs.legit li .dot{background:#14b8a6;}
  .explain{font-size:20px;line-height:1.5;color:var(--muted);margin:20px 0 0;padding-top:16px;border-top:1px solid var(--line-soft);}
  .lesson{display:flex;align-items:flex-start;gap:12px;margin-top:16px;border-radius:12px;background:var(--amber-soft);padding:14px 16px;}
  .lesson p{font-size:20px;font-weight:500;color:#78350f;margin:0;}

  footer{text-align:center;color:var(--faint);font-size:16px;margin:40px 0 32px;}

  @media (prefers-reduced-motion:reduce){*{transition:none !important;}}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ======================================================================
   Spot the Scam — standalone offline activity (no network, no Claude).
   Boots straight into the activity so it can be combined with other demos.
   To skip the intro and open directly in play mode, change the initial
   state.screen below from "welcome" to "play" (and call nextMessage() first).
   ====================================================================== */

/* ---------- inline icons (Lucide-style, MIT) ---------- */
const I = {
  shieldCheck:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/>',
  alert:'<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12" y2="17"/>',
  check:'<polyline points="20 6 9 17 4 12"/>',
  x:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  arrowRight:'<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>',
  sparkles:'<path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3z"/>',
  message:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
  mail:'<rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/>',
  phone:'<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>'
};
function svg(name,size){
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+I[name]+'</svg>';
}

/* ---------- example bank ---------- */
const BANK = [
  {isScam:true,channel:"Text message",sender:"+1 (415) 555-0142",subject:null,
   body:"Grandma it's me, I'm in trouble and lost my phone so this is a friend's number. I had an accident and need $800 for bail. Please don't tell mom and dad. Can you send it on gift cards right now? I'll explain everything later.",
   redFlags:["Creates panic and rushes you to act \u201cright now.\u201d","Asks you to keep it a secret from the rest of the family.","Wants payment in gift cards \u2014 real emergencies never work this way.","Comes from an unknown number claiming to be a loved one."],
   safeSigns:[],
   explanation:"This is the classic \u201cgrandchild in trouble\u201d scam. Scammers use fear and secrecy so you act before you can check. A real family member would let you call their parents.",
   lesson:"If a message rushes you and says \u201cdon't tell anyone,\u201d stop and call your family directly."},
  {isScam:false,channel:"Text message",sender:"CVS Pharmacy",subject:null,
   body:"Hi Margaret, your prescription is ready for pickup at the Maple Street CVS. Reply STOP to opt out of reminders. No action needed if you've already picked it up.",
   redFlags:[],
   safeSigns:["It doesn't ask for money, passwords, or personal details.","It matches a service you already use.","There's no link to click and no sense of panic."],
   explanation:"This is a normal pharmacy reminder. Legitimate businesses send simple updates and never ask you to enter a password or pay a surprise fee by text.",
   lesson:"Real reminders inform you. Scams pressure you. Look for the pressure."},
  {isScam:true,channel:"Email",sender:"Amaz0n Security <verify@amaz0n-account-secure.com>",subject:"URGENT: Your account has been suspended",
   body:"Dear Customer, we detected unusual activity. Your account is suspended. You must verify your identity within 24 hours or it will be permanently closed. Click here to confirm your login and billing details: amaz0n-account-secure.com/verify",
   redFlags:["The sender's address is misspelled (\u201cAmaz0n\u201d with a zero).","It threatens to close your account to make you panic.","It wants you to click a link and re-enter your login and card details.","It greets you as \u201cDear Customer\u201d instead of your name."],
   safeSigns:[],
   explanation:"This is a phishing email. Real companies don't ask you to confirm your password by clicking an email link. The fake web address is the giveaway.",
   lesson:"Never log in through a link in an email. Open the app or type the website yourself."},
  {isScam:false,channel:"Email",sender:"First National Bank <alerts@firstnationalbank.com>",subject:"We paused a charge on your card",
   body:"We paused a $312 charge at an electronics store because it looked unusual. If this was you, no action is needed. If it wasn't, call the number on the back of your card. We will never ask for your PIN or password.",
   redFlags:[],
   safeSigns:["It tells you to call the number on the back of your card \u2014 not a number in the email.","It clearly states the bank will never ask for your PIN.","If it was really you, no action is needed \u2014 no pressure."],
   explanation:"This is a genuine fraud alert. Notice it gives you a safe way to respond (your own card) and never asks for secret information.",
   lesson:"A real bank points you back to your card. A fake one asks for your PIN."},
  {isScam:true,channel:"Voicemail",sender:"Unknown caller (\u201cSocial Security Administration\u201d)",subject:null,
   body:"This is a final notice from the Social Security Administration. Your Social Security number has been suspended due to suspicious activity. A warrant has been issued for your arrest. To avoid legal action, call us back immediately and be ready to verify your identity with payment.",
   redFlags:["Government agencies do not threaten arrest by voicemail.","Your Social Security number cannot be \u201csuspended.\u201d","It demands you call back and pay immediately.","It uses fear of arrest to stop you thinking clearly."],
   safeSigns:[],
   explanation:"This is a government-impersonation scam. Agencies like Social Security contact you by mail and never demand payment over the phone to avoid arrest.",
   lesson:"Threats of arrest over the phone are always a scam. Hang up and don't call back."},
  {isScam:true,channel:"Text message",sender:"USPS",subject:null,
   body:"USPS: Your package is on hold due to an unpaid shipping fee of $1.99. Please update your payment to release it: usps-redelivery-fee.com",
   redFlags:["A tiny fee plus a link is a trick to capture your card details.","Real carriers don't text you a link to pay a surprise fee.","The web address isn't the real USPS website."],
   safeSigns:[],
   explanation:"This is a \u201cpackage fee\u201d scam. The small amount makes it feel harmless, but the goal is to steal your card number on the fake page.",
   lesson:"Don't pay fees through links in texts. Check tracking on the carrier's real website."},
  {isScam:false,channel:"Text message",sender:"Dr. Lee's Office",subject:null,
   body:"Reminder: you have an appointment with Dr. Lee on Tuesday at 10:00 AM. Reply C to confirm or call us to reschedule. Thank you!",
   redFlags:[],
   safeSigns:["It's an appointment you're expecting.","There's no payment and no link asking for details.","Confirming is simple and doesn't reveal personal information."],
   explanation:"This is a routine appointment reminder. It asks only for a simple confirmation and never for money or private details.",
   lesson:"Expected, specific, and no money asked for \u2014 usually a sign it's real."},
  {isScam:true,channel:"Email",sender:"Microsoft Support <help@ms-security-team.net>",subject:"Virus detected on your computer",
   body:"Warning! Our scan found 3 viruses on your computer. Your files are at risk. Call our support line now at 1-888-555-0177 and allow our technician remote access so we can remove them before your data is lost.",
   redFlags:["Real companies can't scan your computer through an email.","It wants you to call and give a stranger remote access.","It uses fear of losing your files to rush you."],
   safeSigns:[],
   explanation:"This is a tech-support scam. Once you give remote access, the \u201ctechnician\u201d can steal information or demand payment. Microsoft never contacts you this way.",
   lesson:"Never let an unexpected caller take control of your computer."},
  {isScam:true,channel:"Text message",sender:"+1 (202) 555-0190",subject:null,
   body:"Congratulations! You've been selected to win a $1,000 gift card. To claim your prize, just confirm your name, address, and card number at win-bigrewards.com within 12 hours.",
   redFlags:["You can't win a prize you never entered.","It asks for your card number to \u201cclaim\u201d a reward.","It puts you on a countdown to rush you."],
   safeSigns:[],
   explanation:"This is a prize scam. Real giveaways never need your card number, and a genuine prize wouldn't expire in hours to pressure you.",
   lesson:"If you have to give card details to receive a \u201cfree\u201d prize, it's a scam."},
  {isScam:false,channel:"Email",sender:"City Public Library <noreply@citylibrary.org>",subject:"Your book is due soon",
   body:"Hello, this is a friendly reminder that \u201cThe Thursday Murder Club\u201d is due back on Friday. You can renew online or in person if you'd like more time. No fees are due at this time.",
   redFlags:[],
   safeSigns:["It's about a book you actually borrowed.","It doesn't ask for money or personal details.","Renewing is optional and there's no pressure."],
   explanation:"This is an ordinary library reminder. It references something real you did and asks nothing sensitive of you.",
   lesson:"Messages about things you genuinely did, with no money asked, are usually safe."}
];

/* ---------- state ---------- */
const state = { screen:"welcome", current:null, guess:null, score:{correct:0,total:0}, order:[], pos:0 };

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function nextMessage(){
  if(state.pos>=state.order.length){ state.order=shuffle(BANK.map((_,i)=>i)); state.pos=0; }
  state.current=BANK[state.order[state.pos]]; state.pos++;
  state.guess=null; state.screen="play";
}

/* ---------- actions ---------- */
const A={
  start(){ nextMessage(); render(); },
  next(){ nextMessage(); render(); },
  answer(saidScam){ if(state.guess!==null)return; state.guess=saidScam; state.score.total++; if(saidScam===state.current.isScam)state.score.correct++; render(); }
};

/* ---------- render ---------- */
const app=document.getElementById("app");
const CHAN={ "Text message":{icon:"message",label:"Text message"},
            "Email":{icon:"mail",label:"Email"},
            "Voicemail":{icon:"phone",label:"Voicemail transcript"} };

function render(){
  app.innerHTML='<div class="wrap">'+(state.screen==="welcome"?welcomeHTML():playHTML())
    +'<footer>Every example here is made up for practice.</footer></div>';
  wire();
}

function welcomeHTML(){
  return ''
   +'<div class="welcome">'
     +'<div class="biglogo">'+svg("shieldCheck",44)+'</div>'
     +'<h1 class="serif">Spot the Scam</h1>'
     +'<p class="lead">Scam messages are everywhere. Here you can practice telling the real ones from the fakes \u2014 calmly, and with nothing to lose.</p>'
     +'<div class="steps">'
       +'<div class="step"><div class="n serif">1</div><p>Read a message, just like one you might really get.</p></div>'
       +'<div class="step"><div class="n serif">2</div><p>Decide: does it look safe, or like a scam?</p></div>'
       +'<div class="step"><div class="n serif">3</div><p>See the answer and learn the warning signs.</p></div>'
     +'</div>'
     +'<button class="btn-primary" style="margin-top:40px" data-act="start">Start practicing '+svg("arrowRight",26)+'</button>'
     +'<p class="faint" style="font-size:18px;margin-top:24px">Every example is made up. You can\u2019t lose any money here.</p>'
   +'</div>';
}

function playHTML(){
  const scoreHTML = state.score.total>0
    ? '<div class="score"><div class="lab">Spotted</div><div class="val serif">'+state.score.correct+' <span class="faint">of</span> '+state.score.total+'</div></div>'
    : '';
  const head='<div class="act-head"><div class="act-id"><div class="logo">'+svg("shieldCheck",26)+'</div>'
    +'<div><h1 class="serif">Spot the Scam</h1><p>A safe place to practice</p></div></div>'+scoreHTML+'</div>';
  return head + roundHTML();
}

function roundHTML(){
  const m=state.current, answered=state.guess!==null, ch=CHAN[m.channel];
  let html='<div class="msg"><div class="chan">'+svg(ch.icon,22)+ch.label+'</div>'
    +'<div class="body"><div class="from">From: <b>'+esc(m.sender)+'</b></div>'
    +(m.subject?'<div class="subj serif">'+esc(m.subject)+'</div>':'')
    +'<p class="text">'+esc(m.body)+'</p></div></div>';
  if(!answered){
    html+='<div class="choices">'
      +'<button class="choice safe" data-ans="0">'+svg("shieldCheck",28)+' Looks safe</button>'
      +'<button class="choice scam" data-ans="1">'+svg("alert",28)+' Looks like a scam</button>'
      +'</div>';
  } else {
    html+=revealHTML();
  }
  return html;
}

function revealHTML(){
  const m=state.current, correct=state.guess===m.isScam, isScam=m.isScam;
  const items=(isScam?m.redFlags:m.safeSigns).map(x=>'<li><span class="dot"></span>'+esc(x)+'</li>').join("");
  return ''
   +'<div class="verdict '+(correct?"right":"wrong")+'">'
     +'<div class="badge">'+svg(correct?"check":"x",28)+'</div>'
     +'<div><h2 class="serif">'+(correct?"Well spotted!":"Good try \u2014 let\u2019s look closer")+'</h2>'
     +'<p>This message was '+(isScam?"a scam":"legitimate")+'.</p></div></div>'
   +'<div class="signs '+(isScam?"scam":"legit")+'">'
     +'<h3 class="serif">'+svg(isScam?"alert":"shieldCheck",22)+(isScam?"Warning signs":"Why this one is safe")+'</h3>'
     +'<ul>'+items+'</ul>'
     +'<p class="explain">'+esc(m.explanation)+'</p>'
     +(m.lesson?'<div class="lesson">'+svg("sparkles",22)+'<p>'+esc(m.lesson)+'</p></div>':'')
   +'</div>'
   +'<button class="btn-primary full" style="margin-top:24px" data-act="next">Next message '+svg("arrowRight",26)+'</button>';
}

function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ---------- wiring ---------- */
function wire(){
  app.querySelectorAll("[data-act]").forEach(el=>el.addEventListener("click",()=>A[el.getAttribute("data-act")]()));
  app.querySelectorAll("[data-ans]").forEach(el=>el.addEventListener("click",()=>A.answer(el.getAttribute("data-ans")==="1")));
}

render();
</script>
</body>
</html>
