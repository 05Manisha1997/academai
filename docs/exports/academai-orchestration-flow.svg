<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="520" height="720" viewBox="0 0 520 720" role="img" aria-label="academAI orchestration flow">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4a5568"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#c53030"/>
    </marker>
    <style>
      .step { fill: #ffffff; stroke: #cbd5e0; stroke-width: 1.5; }
      .step-block { fill: #fff5f5; stroke: #fc8181; stroke-width: 1.5; }
      .step-ok { fill: #f0fff4; stroke: #68d391; stroke-width: 1.5; }
      .title { font: 700 16px sans-serif; fill: #1a202c; }
      .sub { font: 400 11px sans-serif; fill: #718096; }
      .box-title { font: 600 12px sans-serif; fill: #1a202c; }
      .box-sub { font: 400 10px sans-serif; fill: #718096; }
      .conn { fill: none; stroke: #4a5568; stroke-width: 1.5; marker-end: url(#arrow); }
      .conn-block { fill: none; stroke: #c53030; stroke-width: 1.5; stroke-dasharray: 5 3; marker-end: url(#arrow-red); }
      .decision { fill: #ebf8ff; stroke: #3182ce; stroke-width: 1.5; }
      .note { font: 400 10px sans-serif; fill: #718096; }
    </style>
  </defs>

  <text x="24" y="28" class="title">academAI — Orchestration Flow</text>
  <text x="24" y="46" class="sub">POST /api/orchestrate · src/lib/orchestrator/pipeline.ts</text>

  <!-- Steps -->
  <rect x="110" y="70" width="300" height="56" rx="6" class="step"/>
  <text x="260" y="94" text-anchor="middle" class="box-title">1. User prompt</text>
  <text x="260" y="112" text-anchor="middle" class="box-sub">Cadet Sandbox · Prompt Playground</text>

  <line x1="260" y1="126" x2="260" y2="148" class="conn"/>

  <rect x="110" y="148" width="300" height="56" rx="6" class="step"/>
  <text x="260" y="172" text-anchor="middle" class="box-title">2. Input guardrails</text>
  <text x="260" y="190" text-anchor="middle" class="box-sub">Cadet scan · analyze · EU AI Act · safety</text>

  <line x1="260" y1="204" x2="260" y2="226" class="conn"/>

  <polygon points="260,226 360,266 260,306 160,266" class="decision"/>
  <text x="260" y="262" text-anchor="middle" class="box-title">Blocked?</text>
  <text x="260" y="278" text-anchor="middle" class="box-sub">severity = block</text>

  <!-- Block branch -->
  <path d="M 160 266 L 60 266" class="conn-block"/>
  <text x="100" y="258" class="note">yes</text>
  <rect x="10" y="238" width="100" height="56" rx="6" class="step-block"/>
  <text x="60" y="262" text-anchor="middle" class="box-title">Refusal</text>
  <text x="60" y="278" text-anchor="middle" class="box-sub">no model call</text>

  <!-- Continue -->
  <line x1="260" y1="306" x2="260" y2="328" class="conn"/>
  <text x="272" y="320" class="note">no / warn</text>

  <rect x="110" y="328" width="300" height="56" rx="6" class="step"/>
  <text x="260" y="352" text-anchor="middle" class="box-title">3. Router</text>
  <text x="260" y="370" text-anchor="middle" class="box-sub">tutor · safety · ingestion · general</text>

  <line x1="260" y1="384" x2="260" y2="406" class="conn"/>

  <rect x="110" y="406" width="300" height="56" rx="6" class="step"/>
  <text x="260" y="430" text-anchor="middle" class="box-title">4. Model adapter</text>
  <text x="260" y="448" text-anchor="middle" class="box-sub">simulated · ollama · langgraph · autogen</text>

  <line x1="260" y1="462" x2="260" y2="484" class="conn"/>

  <rect x="60" y="484" width="100" height="44" rx="4" class="step"/><text x="110" y="510" text-anchor="middle" class="box-sub">Simulated</text>
  <rect x="170" y="484" width="100" height="44" rx="4" class="step"/><text x="220" y="510" text-anchor="middle" class="box-sub">Ollama</text>
  <rect x="280" y="484" width="100" height="44" rx="4" class="step"/><text x="330" y="510" text-anchor="middle" class="box-sub">LangGraph</text>
  <rect x="390" y="484" width="100" height="44" rx="4" class="step"/><text x="440" y="510" text-anchor="middle" class="box-sub">AutoGen</text>

  <line x1="260" y1="528" x2="260" y2="550" class="conn"/>

  <rect x="110" y="550" width="300" height="56" rx="6" class="step"/>
  <text x="260" y="574" text-anchor="middle" class="box-title">5. Output guardrails</text>
  <text x="260" y="592" text-anchor="middle" class="box-sub">PII redact · length cap · EU disclosure label</text>

  <line x1="260" y1="606" x2="260" y2="628" class="conn"/>

  <rect x="110" y="628" width="300" height="56" rx="6" class="step-ok"/>
  <text x="260" y="652" text-anchor="middle" class="box-title">6. Response + metadata</text>
  <text x="260" y="670" text-anchor="middle" class="box-sub">status · backend · route · disclosure</text>

  <text x="24" y="710" class="note">Guardrails run on every request — blocked prompts never reach inference.</text>
</svg>
