    <rect x="420" y="414" width="200" height="44" rx="4" class="box"/><text x="520" y="432" text-anchor="middle" class="box-title">POST /api/sessions</text><text x="520" y="446" text-anchor="middle" class="box-sub">engagement events (stub)</text>
  </g>

