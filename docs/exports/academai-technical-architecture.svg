  <path d="M 520 250 L 520 266" class="conn"/><text x="528" y="260" class="label">RSC / fetch</text>
  <path d="M 520 362 L 520 378" class="conn"/>
  <path d="M 300 458 L 300 482" class="conn"/><text x="308" y="472" class="label">orchestrate</text>
