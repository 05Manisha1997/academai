    <rect x="220" y="746" width="120" height="44" rx="4" class="box"/><text x="280" y="764" text-anchor="middle" class="box-title">.env.local</text><text x="280" y="778" text-anchor="middle" class="box-sub">orchestrator config</text>
    <rect x="360" y="746" width="120" height="44" rx="4" class="box-planned"/><text x="420" y="764" text-anchor="middle" class="box-title">PostgreSQL</text><text x="420" y="778" text-anchor="middle" class="box-sub">planned</text>
    <rect x="500" y="746" width="120" height="44" rx="4" class="box-planned"/><text x="560" y="764" text-anchor="middle" class="box-title">Redis / queue</text><text x="560" y="778" text-anchor="middle" class="box-sub">planned</text>
    <rect x="640" y="746" width="120" height="44" rx="4" class="box-planned"/><text x="700" y="764" text-anchor="middle" class="box-title">S3 media</text><text x="700" y="778" text-anchor="middle" class="box-sub">planned</text>
  </g>

