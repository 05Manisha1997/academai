    <rect x="24" y="44" width="992" height="22" rx="6" class="zone-header"/>
    <rect x="24" y="60" width="992" height="6" class="zone-header"/>
    <text x="34" y="59" class="zone-title">Actors</text>
    <rect x="48" y="68" width="130" height="36" rx="4" class="box"/><text x="113" y="86" text-anchor="middle" class="box-title">Under-14 learners</text>
    <rect x="196" y="68" width="150" height="36" rx="4" class="box"/><text x="271" y="86" text-anchor="middle" class="box-title">Students / Lecturers</text>
    <rect x="364" y="68" width="130" height="36" rx="4" class="box"/><text x="429" y="86" text-anchor="middle" class="box-title">Elderly learners</text>
    <rect x="512" y="68" width="130" height="36" rx="4" class="box-planned"/><text x="577" y="82" text-anchor="middle" class="box-title">Editors (planned)</text><text x="577" y="96" text-anchor="middle" class="box-sub">content review</text>
