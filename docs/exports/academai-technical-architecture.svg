<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="820" viewBox="0 0 1040 820" role="img" aria-label="academAI technical architecture">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4a5568"/>
    </marker>
    <style>
      .zone { fill: #f7fafc; stroke: #2d3748; stroke-width: 1.5; }
      .zone-planned { fill: #f7fafc; stroke: #2d3748; stroke-width: 1.5; stroke-dasharray: 8 4; }
      .zone-header { fill: #edf2f7; }
      .zone-title { font: 700 11px sans-serif; fill: #1a202c; }
      .zone-sub { font: 400 9px sans-serif; fill: #718096; }
      .box { fill: #ffffff; stroke: #cbd5e0; stroke-width: 1; }
      .box-planned { fill: #ffffff; stroke: #cbd5e0; stroke-width: 1; stroke-dasharray: 5 3; }
      .box-title { font: 600 11px sans-serif; fill: #1a202c; }
      .box-sub { font: 400 9px sans-serif; fill: #718096; }
      .conn { fill: none; stroke: #4a5568; stroke-width: 1.5; marker-end: url(#arrow); }
      .pipe { stroke: #3182ce; stroke-width: 1.5; marker-end: url(#arrow); }
      .label { font: 400 9px sans-serif; fill: #718096; }
      .doc-title { font: 700 16px sans-serif; fill: #1a202c; }
      .doc-sub { font: 400 11px sans-serif; fill: #718096; }
    </style>
  </defs>

  <text x="24" y="16" class="doc-title">academAI — Technical Architecture</text>
  <text x="24" y="32" class="doc-sub">Learn · Practice · Prevent · solid = shipped · dashed = planned</text>

  <!-- Actors -->
