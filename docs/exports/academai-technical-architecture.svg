    <text x="1006" y="497" text-anchor="end" class="zone-sub">src/lib/orchestrator — pipeline.ts</text>
    <rect x="80" y="522" width="140" height="44" rx="4" class="box"/><text x="150" y="540" text-anchor="middle" class="box-title">Input guardrails</text><text x="150" y="554" text-anchor="middle" class="box-sub">EU AI Act · safety</text>
    <rect x="250" y="522" width="120" height="44" rx="4" class="box"/><text x="310" y="548" text-anchor="middle" class="box-title">Router</text>
