    <rect x="48" y="176" width="118" height="52" rx="4" class="box"/><text x="107" y="196" text-anchor="middle" class="box-title">Homepage</text><text x="107" y="210" text-anchor="middle" class="box-sub">Learn · Practice · Prevent</text>
    <rect x="182" y="176" width="118" height="52" rx="4" class="box"/><text x="241" y="196" text-anchor="middle" class="box-title">Dashboard</text><text x="241" y="210" text-anchor="middle" class="box-sub">/dashboard/[profile]</text>
