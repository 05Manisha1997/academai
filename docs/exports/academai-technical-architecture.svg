    <text x="1006" y="609" text-anchor="end" class="zone-sub">Local-first · no cloud API keys</text>
    <rect x="120" y="634" width="120" height="44" rx="4" class="box"/><text x="180" y="652" text-anchor="middle" class="box-title">Simulated</text><text x="180" y="666" text-anchor="middle" class="box-sub">offline templates</text>
    <rect x="270" y="634" width="120" height="44" rx="4" class="box"/><text x="330" y="652" text-anchor="middle" class="box-title">Ollama</text><text x="330" y="666" text-anchor="middle" class="box-sub">Llama 2 · :11434</text>
    <rect x="420" y="634" width="120" height="44" rx="4" class="box"/><text x="480" y="652" text-anchor="middle" class="box-title">LangGraph</text><text x="480" y="666" text-anchor="middle" class="box-sub">Python · :8001</text>
    <rect x="570" y="634" width="120" height="44" rx="4" class="box"/><text x="630" y="652" text-anchor="middle" class="box-title">AutoGen</text><text x="630" y="666" text-anchor="middle" class="box-sub">Python · :8002</text>
